  <style>
    /* CSS Variables for theming. You can pick your favorite and set it as the default :root */

    /* THEME 1: Parchment (Default Light) */
    :root {
      --bg: #fdfaf2;
      --text: #3e322b;
      --text-muted: #7c6b5d;
      --link: #933c24;
      --link-hover: #b84a2b;
      --meta-bg: #f4ecd8;
      --border: #e6d8c3;
      --shadow: 0 4px 15px rgba(62, 50, 43, 0.08);
      --font-serif: 'Crimson Pro', Georgia, serif;
      --font-sans: 'Outfit', system-ui, sans-serif;

    /* Default Dark Mode (Midnight) */
    @media (prefers-color-scheme: dark) {

        --bg: #0b1120;
        --text: #e2e8f0;
        --text-muted: #94a3b8;
        --link: #38bdf8;
        --link-hover: #7dd3fc;
        --meta-bg: #1e293b;
        --border: #334155;
        --shadow: 0 8px 30px rgba(0, 0, 0, 0.5);

    /* Explicit theme toggles (these override the OS default if selected) */
    [data-theme="parchment"] {
      --bg: #fdfaf2;
      --text: #3e322b;
      --text-muted: #7c6b5d;
      --link: #933c24;
      --link-hover: #b84a2b;
      --meta-bg: #f4ecd8;
      --border: #e6d8c3;
      --shadow: 0 4px 15px rgba(62, 50, 43, 0.08);

      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --link: #38bdf8;
      --link-hover: #7dd3fc;

    /* Base Typography & Layout */
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 1.2rem; /* Slightly larger for easier reading */

    /* Prevents page from scrolling when image zoom is open */
    body.modal-open {

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      position: relative;
    }

      line-height: 1.2;

      margin-bottom: 1rem;

    h1 { font-size: 2.5rem; margin-top: 0; margin-bottom: 0.5rem; }
    h2 { font-size: 1.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    header h2 { font-size: 2.5rem; margin-top: 0; border-bottom: none; padding-bottom: 0; margin-bottom: 0.5rem; }

    p { margin-top: 0; margin-bottom: 1.5rem; }

    blockquote {

      margin: 0 0 1.5rem 0;
      padding-left: 1rem;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Links */
    a {
      color: var(--link);
      text-decoration: none;
      border-bottom: 1px dotted var(--link);
      transition: color 0.2s, border-bottom-color 0.2s;
      font-weight: 600;
    }

    a:hover {
      color: var(--link-hover);
      border-bottom: 1px solid var(--link-hover);
    }

    /* Article Header / Metadata block */
    header {
      margin-bottom: 3rem;
    }

    .metadata {
      font-family: var(--font-sans);
      font-size: 0.95rem;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-top: 1.5rem;
    }

    .metadata p { margin: 0; }

    .tag {
      display: inline-block;
      background: var(--meta-bg);
      padding: 0.15rem 0.6rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    /* Images */
    figure {
      margin: 3.5rem 0;
      padding: 0;
    }

    figure img {
      max-width: 100%;
      height: auto;
      border-radius: 8px; /* Slightly sharper corners fit the book aesthetic */
      box-shadow: var(--shadow);
      display: block;
      margin: 0 auto;
      cursor: zoom-in;
    }

    figcaption {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 1rem;
      font-style: italic;
    }

    /* Image Zoom Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      backdrop-filter: blur(5px);
      cursor: zoom-out;
    }

    .lightbox.active {
      display: flex;
      opacity: 1;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 4px;
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
      object-fit: contain;
      cursor: grab;
      transition: transform 0.1s ease-out;
      will-change: transform;
    }

    .lightbox img:active {

    hr {

    /* Footer / Navigation */

<!-- Lightbox Modal for Image Zoom -->
<div id="lightbox" class="lightbox" aria-hidden="true">
  <img id="lightbox-img" src="" alt="Zoomed image view">
</div>

<script>
  const themeToggle = document.getElementById('theme-toggle');
  const root = document.documentElement;

  // Determine initial theme (checking localStorage first, then system preference)
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const savedTheme = localStorage.getItem('theme');
  let currentTheme = savedTheme ? savedTheme : (prefersDark ? 'midnight' : 'parchment');

  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    themeToggle.textContent = theme === 'midnight' ? 'Light mode' : 'Dark mode';
    themeToggle.setAttribute('aria-label', theme === 'midnight' ? 'Switch to Light Mode' : 'Switch to Dark Mode');
    themeToggle.setAttribute('title', theme === 'midnight' ? 'Switch to Light Mode' : 'Switch to Dark Mode');
  }

  // Apply initially
  applyTheme(currentTheme);

  // Toggle on click
  themeToggle.addEventListener('click', () => {
    currentTheme = currentTheme === 'parchment' ? 'midnight' : 'parchment';
    applyTheme(currentTheme);
  });

  // --- Image Lightbox Functionality ---
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  // Find all images inside figures within the content area
  const contentImages = document.querySelectorAll('.content figure img');

  let currentScale = 1;
  let isDragging = false;
  let startX, startY;
  let translateX = 0, translateY = 0;

  function updateTransform() {
    lightboxImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
  }

  function resetImage() {
    currentScale = 1;
    translateX = 0;
    translateY = 0;
    lightboxImg.style.transition = 'transform 0.1s ease-out';
    updateTransform();
  }

  contentImages.forEach(img => {
    img.addEventListener('click', function() {
      lightboxImg.src = this.src;
      lightboxImg.alt = this.alt;
      resetImage();
      lightbox.classList.add('active');
      document.body.classList.add('modal-open'); // Prevent background scrolling
    });
  });

  // Close lightbox ONLY when clicking on the overlay (not the image itself)
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) {
      lightbox.classList.remove('active');
      document.body.classList.remove('modal-open');
    }
  });

  // Zoom functionality (Wheel)
  lightbox.addEventListener('wheel', (e) => {
    e.preventDefault(); // Prevent page scroll
    const zoomSensitivity = 0.1;
    const delta = e.deltaY < 0 ? 1 : -1;
    const zoomFactor = 1 + delta * zoomSensitivity;

    let newScale = currentScale * zoomFactor;

    // Limit scale bounds (allow deep zoom for large maps)
    if (newScale < 0.2) newScale = 0.2;
    if (newScale > 15) newScale = 15;

    // Math to zoom in exactly toward the mouse pointer
    const rect = lightbox.getBoundingClientRect();
    const mouseX = e.clientX - rect.left - rect.width / 2;
    const mouseY = e.clientY - rect.top - rect.height / 2;

    const scaleChange = newScale / currentScale;
    translateX = mouseX - (mouseX - translateX) * scaleChange;
    translateY = mouseY - (mouseY - translateY) * scaleChange;

    currentScale = newScale;
    lightboxImg.style.transition = 'transform 0.1s ease-out'; // Keep zoom smooth
    updateTransform();
  }, { passive: false });

  // Pan functionality (Mouse Drag)
  lightboxImg.addEventListener('mousedown', (e) => {
    e.preventDefault();
    isDragging = true;
    lightboxImg.style.transition = 'none'; // Disable transition for instant 1:1 panning
    startX = e.clientX - translateX;
    startY = e.clientY - translateY;
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    translateX = e.clientX - startX;
    translateY = e.clientY - startY;
    updateTransform();
  });

  window.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      lightboxImg.style.transition = 'transform 0.1s ease-out'; // Restore transition
    }
  });

  // Pan functionality (Touch Drag for Mobile)
  lightboxImg.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      lightboxImg.style.transition = 'none';
      startX = e.touches[0].clientX - translateX;
      startY = e.touches[0].clientY - translateY;
    }
  });

  window.addEventListener('touchmove', (e) => {
    if (!isDragging || e.touches.length !== 1) return;
    // Prevent default behavior (pull-to-refresh, scrolling) while dragging image
    if (lightbox.classList.contains('active')) {
      e.preventDefault();
    }
    translateX = e.touches[0].clientX - startX;
    translateY = e.touches[0].clientY - startY;
    updateTransform();
  }, { passive: false });

  window.addEventListener('touchend', () => {
    isDragging = false;
    lightboxImg.style.transition = 'transform 0.1s ease-out';
  });
</script>
