  document.getElementById('page-content').innerHTML = marked.parse(contentMarkdown);

  // Wrap standalone <p><img></p> in <figure> for lightbox compatibility
  document.querySelectorAll('#page-content p > img:only-child').forEach(img => {
    const p = img.parentNode;
    const figure = document.createElement('figure');
    p.parentNode.insertBefore(figure, p);
    figure.appendChild(img);
    p.remove();
  });

  // Resolve {#anchor-id} in headings and inject hover anchor links
  document.querySelectorAll('#page-content h1, #page-content h2, #page-content h3, #page-content h4').forEach(h => {
    const customAnchorMatch = h.textContent.match(/\{#([\w-]+)\}/);
    if (customAnchorMatch) {
      h.id = customAnchorMatch[1];
      h.innerHTML = h.innerHTML.replace(/\{#[\w-]+\}/g, '').trim();
    }
    if (h.id) {
      h.innerHTML += `<a class="header-anchor" href="#${h.id}">#</a>`;
    }
  });

  // Style missing links (zeithalt://missing/ scheme → .missing-link)
  document.querySelectorAll('#page-content a').forEach(a => {
    const href = a.getAttribute('href') || '';
    if (href.startsWith('zeithalt://missing/')) {
      const filePath = href.replace('zeithalt://missing/', '');
      a.removeAttribute('href');
      a.classList.add('missing-link');
      a.dataset.missingFile = filePath;
      a.title = 'Page not found';
    }
  });


  const root = document.documentElement;

  // Determine initial theme (checking localStorage first, then system preference)
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  
  let savedTheme = null;
  try {
    savedTheme = localStorage.getItem('theme');
  } catch(e) { /* Ignore if DOM Storage is disabled */ }
  
  let currentTheme = savedTheme ? savedTheme : (prefersDark ? 'midnight' : 'parchment');

  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    try {
      localStorage.setItem('theme', theme);
    } catch(e) { /* Ignore if DOM Storage is disabled */ }
    
    themeToggle.textContent = theme === 'midnight' ? 'Light' : 'Dark';
    themeToggle.setAttribute('aria-label', theme === 'midnight' ? 'Switch to Light Mode' : 'Switch to Dark Mode');
    themeToggle.setAttribute('title', theme === 'midnight' ? 'Switch to Light Mode' : 'Switch to Dark Mode');
  }

  // Apply initially
  applyTheme(currentTheme);

  // Toggle on click
  themeToggle.addEventListener('click', () => {
    currentTheme = currentTheme === 'parchment' ? 'midnight' : 'parchment';
    applyTheme(currentTheme);
  });

  // --- Image Lightbox Functionality ---
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  // Find all images inside figures within the content area
  const contentImages = document.querySelectorAll('.content figure img');

  let currentScale = 1;
  let isDragging = false;
  let startX, startY;
  let translateX = 0, translateY = 0;

  function updateTransform() {
    lightboxImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
  }

  function resetImage() {
    currentScale = 1;
    translateX = 0;
    translateY = 0;
    lightboxImg.style.transition = 'transform 0.1s ease-out';
    updateTransform();
  }

  contentImages.forEach(img => {
    img.addEventListener('click', function() {
      lightboxImg.src = this.src;
      lightboxImg.alt = this.alt;
      resetImage();
      lightbox.classList.add('active');
      document.body.classList.add('modal-open'); // Prevent background scrolling
    });
  });

  // Close lightbox ONLY when clicking on the overlay (not the image itself)
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) {
      lightbox.classList.remove('active');
      document.body.classList.remove('modal-open');
    }
  });

  // Zoom functionality (Wheel)
  lightbox.addEventListener('wheel', (e) => {
    e.preventDefault(); // Prevent page scroll
    const zoomSensitivity = 0.1;
    const delta = e.deltaY < 0 ? 1 : -1;
    const zoomFactor = 1 + delta * zoomSensitivity;

    let newScale = currentScale * zoomFactor;

    // Limit scale bounds (allow deep zoom for large maps)
    if (newScale < 0.2) newScale = 0.2;
    if (newScale > 15) newScale = 15;

    // Math to zoom in exactly toward the mouse pointer
    const rect = lightbox.getBoundingClientRect();
    const mouseX = e.clientX - rect.left - rect.width / 2;
    const mouseY = e.clientY - rect.top - rect.height / 2;

    const scaleChange = newScale / currentScale;
    translateX = mouseX - (mouseX - translateX) * scaleChange;
    translateY = mouseY - (mouseY - translateY) * scaleChange;

    currentScale = newScale;
    lightboxImg.style.transition = 'transform 0.1s ease-out'; // Keep zoom smooth
    updateTransform();
  }, { passive: false });

  // Pan functionality (Mouse Drag)
  lightboxImg.addEventListener('mousedown', (e) => {
    e.preventDefault();
    isDragging = true;
    lightboxImg.style.transition = 'none'; // Disable transition for instant 1:1 panning
    startX = e.clientX - translateX;
    startY = e.clientY - translateY;
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    translateX = e.clientX - startX;
    translateY = e.clientY - startY;
    updateTransform();
  });

  window.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      lightboxImg.style.transition = 'transform 0.1s ease-out'; // Restore transition
    }
  });

  // Pan functionality (Touch Drag for Mobile)
  lightboxImg.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      lightboxImg.style.transition = 'none';
      startX = e.touches[0].clientX - translateX;
      startY = e.touches[0].clientY - translateY;
    }
  });

  window.addEventListener('touchmove', (e) => {
    if (!isDragging || e.touches.length !== 1) return;
    // Prevent default behavior (pull-to-refresh, scrolling) while dragging image
    if (lightbox.classList.contains('active')) {
      e.preventDefault();
    }
    translateX = e.touches[0].clientX - startX;
    translateY = e.touches[0].clientY - startY;
    updateTransform();
  }, { passive: false });

  window.addEventListener('touchend', () => {
    isDragging = false;
    lightboxImg.style.transition = 'transform 0.1s ease-out';
  });

  // --- Share Button Functionality ---
  const btnShare = document.getElementById('btn-share');
  if (btnShare) {
    btnShare.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(window.location.href);
        const originalText = btnShare.textContent;
        btnShare.textContent = 'Copied!';
        setTimeout(() => {
          btnShare.textContent = originalText;
        }, 2000);
      } catch (err) {
        console.error('Failed to copy link: ', err);
      }
    });
  }
  // --- Missing Link: Hidden Editor Access (Ctrl+click or Alt+click) ---
  document.addEventListener('click', (e) => {
    const link = e.target.closest('a.missing-link');
    if (!link) return;
    e.preventDefault();
    if (e.ctrlKey || e.altKey) {
      const file = link.dataset.missingFile;
      if (file) {
        window.open(`https://alexxdev.eu/md_editor?file=${encodeURIComponent(file)}`, '_blank');
      }
    }
  });
