  <style>
    /* ========================================================= */
/* 🦋 MIMBOT SHARED THEME BLOCK                              */
/* ========================================================= */
:root, [data-theme="parchment"] {
  /* Parchment Light Theme */
  --bg: #fdfaf2;
  --text: #3e322b;
  --text-muted: #7c6b5d;
  --link: #933c24;
  --link-hover: #b84a2b;
  --meta-bg: #f4ecd8;
  --border: #e6d8c3;
  --shadow: 0 4px 15px rgba(62, 50, 43, 0.08);
  --font-serif: 'Crimson Pro', Georgia, serif;
  --font-sans: 'Outfit', system-ui, sans-serif;
  --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
}

[data-theme="midnight"] {
  /* Midnight Dark Theme */
  --bg: #0b1120;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --link: #38bdf8;
  --link-hover: #7dd3fc;
  --meta-bg: #1e293b;
  --border: #334155;
  --shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
}

.mimbot-theme {
  background-color: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 1.2rem;
  line-height: 1.65;
  transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
}

/* Reading Area Constraint */
.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 3rem 1.5rem;
  position: relative;
}

/* Scoped to elements within .mimbot-content so it doesn't break app UI like toolbars */
.mimbot-content h1, .mimbot-content h2, .mimbot-content h3 {
  font-weight: 600;
  line-height: 1.2;
  margin-top: 2.5rem;
  margin-bottom: 1rem;
  color: var(--text);
  position: relative;
}

.mimbot-content .header-anchor {
  display: inline-block;
  margin-left: 0.4em;
  font-size: 0.7em;
  font-weight: 400;
  color: var(--border);
  text-decoration: none;
  border-bottom: none !important;
  opacity: 0;
  transition: opacity 0.15s;
  vertical-align: middle;
  user-select: none;
}

.mimbot-content h1:hover .header-anchor,
.mimbot-content h2:hover .header-anchor,
.mimbot-content h3:hover .header-anchor,
.mimbot-content h4:hover .header-anchor {
  opacity: 1;
}

.mimbot-content h1 { font-size: 2.5rem; margin-top: 0; margin-bottom: 0.5rem; }
.mimbot-content h2 { font-size: 1.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
.mimbot-content p { margin-top: 0; margin-bottom: 1.5rem; }

.mimbot-content a {
  color: var(--link);
  text-decoration: none;
  border-bottom: 1px dotted var(--link);
  font-weight: 600;
  transition: color 0.2s, border-bottom-color 0.2s;
}

.mimbot-content a:hover {
  color: var(--link-hover);
  border-bottom: 1px solid var(--link-hover);
}

.mimbot-content blockquote {
  border-left: 4px solid var(--border);
  margin: 0 0 1.5rem 0;
  padding-left: 1rem;
  color: var(--text-muted);
  font-style: italic;
  transition: border-color 0.4s ease, color 0.4s ease;
}

.mimbot-content code {
  font-family: var(--font-mono);
  font-size: 0.85em;
  background: var(--meta-bg);
  color: var(--text);
  padding: 0.15em 0.3em;
  border-radius: 4px;
  transition: background-color 0.4s ease, color 0.4s ease;
}

.mimbot-content ul, .mimbot-content ol { margin-bottom: 1.5rem; }

.mimbot-content img {
  max-width: 100%;
  height: auto;
  border-radius: 8px;
  box-shadow: var(--shadow);
  display: block;
  margin: 2rem 0;
  cursor: zoom-in;
  transition: box-shadow 0.4s ease;
}

.mimbot-content hr {
  border: 0;
  height: 1px;
  background-color: var(--border);
  margin: 3rem 0;
  transition: background-color 0.4s ease;
}

/* Metadata */
.mimbot-content .metadata {
  font-family: var(--font-sans);
  font-size: 0.95rem;
  color: var(--text-muted);
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  margin-top: 1.5rem;
  margin-bottom: 2rem;
}
.mimbot-content .metadata p { margin: 0; }

.mimbot-content .tag {
  display: inline-block;
  background: var(--meta-bg);
  padding: 0.15rem 0.6rem;
  border-radius: 6px;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
}

/* Footer */
.mimbot-content .site-footer {
  font-family: var(--font-sans);
  margin-top: 1.5rem;
  padding: 0.75rem 0 0 0;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  row-gap: 0.75rem;
}
.mimbot-content .footer-right {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  row-gap: 0.5rem;
  list-style: none;
  padding: 0;
  margin: 0;
  margin-left: auto;
}
.mimbot-content .footer-item {
  display: flex;
  align-items: center;
}
.mimbot-content .footer-item + .footer-item::before {
  content: "•";
  color: var(--border);
  font-size: 1rem;
  line-height: 1;
  margin: 0 0.75rem;
  user-select: none;
  pointer-events: none;
  transition: color 0.4s ease;
}
.mimbot-content .footer-link {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  font-weight: 400;
  font-size: 0.9rem;
  line-height: 1;
  border: none !important;
  color: var(--text-muted);
  background: transparent;
  padding: 0;
  cursor: pointer;
  transition: color 0.2s;
  font-family: inherit;
  vertical-align: middle;
}
.mimbot-content .footer-link:hover {
  color: var(--text);
}
.mimbot-content .footer-link svg {
  width: 1.1em;
  height: 1.1em;
}

/* ========================================================= */
/* LIGHTBOX MODAL (Image Zoom capabilities for output pages) */
/* ========================================================= */
.lightbox {
  display: none;
  position: fixed;
  z-index: 9999;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.85);
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s ease;
  backdrop-filter: blur(5px);
  cursor: zoom-out;
}

.lightbox.active {
  display: flex;
  opacity: 1;
}

.lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 4px;
  box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
  object-fit: contain;
  cursor: grab;
  transition: transform 0.1s ease-out;
  will-change: transform;
}

.lightbox img:active {
  cursor: grabbing;
}

/* ========================================================= */
/* MISSING LINK — internal links pointing to non-existent    */
/* pages are styled distinctly so they're easy to spot       */
/* ========================================================= */
.mimbot-content a.missing-link {
  color: var(--text-muted);
  border-bottom: 1px dashed var(--text-muted);
  cursor: not-allowed;
  opacity: 0.7;
}

.mimbot-content a.missing-link:hover {
  color: var(--text-muted);
  border-bottom: 1px dashed var(--text-muted);
}

  </style>
</head>
<body class="mimbot-theme">

<!-- ============================================== -->
<!-- PRODUCTION CODE: PAGE CONTENT                  -->
<!-- ============================================== -->
<main class="container mimbot-content">
  <article>


    <div id="page-content" class="content"></div>
  </article>


  <footer class="site-footer">
    <a href="https://zeithalt.github.io/r/#da30" class="footer-link">
  Mimbot Index
</a>

    <ul class="footer-right">
      <li class="footer-item">
  <a href="https://alexxdev.eu/md_editor?file=../refs/queens_companion.md" class="footer-link">
    Edit
  </a>
</li>

      <li class="footer-item">
        <button id="btn-share" class="footer-link" title="Copy to clipboard">Share</button>
      </li>

      <li class="footer-item">
        <button id="theme-toggle" class="footer-link" aria-label="Toggle Theme" title="Toggle Theme">
          <!-- Text will be injected by JS -->
        </button>
      </li>
    </ul>
  </footer>
</main>

<!-- Lightbox Modal for Image Zoom -->
<div id="lightbox" class="lightbox" aria-hidden="true">
  <img id="lightbox-img" src="" alt="Zoomed image view">
</div>

<script>
  // ── Render page content via marked.js ────────────────────────────
  const contentMarkdown = `# 🎒 The Queen's Companion

\`📜 Item\`

A quiver that provides an endless supply of arrows.

One of [two items](<https://zeithalt.github.io/r/queens_gambit.html>) gifted to the _Mistaken Queen Belle_ for her service in the [Fighters Guild](<https://zeithalt.github.io/r/fighters_guild.html>).
`;
  document.getElementById('page-content').innerHTML = marked.parse(contentMarkdown);

  // Wrap standalone <p><img></p> in <figure> for lightbox compatibility
  document.querySelectorAll('#page-content p > img:only-child').forEach(img => {
    const p = img.parentNode;
    const figure = document.createElement('figure');
    p.parentNode.insertBefore(figure, p);
    figure.appendChild(img);
    p.remove();
  });

  // Resolve {#anchor-id} in headings and inject hover anchor links
  document.querySelectorAll('#page-content h1, #page-content h2, #page-content h3, #page-content h4').forEach(h => {
    const customAnchorMatch = h.textContent.match(/\{#([\w-]+)\}/);
    if (customAnchorMatch) {
      h.id = customAnchorMatch[1];
      h.innerHTML = h.innerHTML.replace(/\{#[\w-]+\}/g, '').trim();
    }
    if (h.id) {
      h.innerHTML += `<a class="header-anchor" href="#${h.id}">#</a>`;
    }
  });

  // Style missing links (zeithalt://missing/ scheme → .missing-link)
  document.querySelectorAll('#page-content a').forEach(a => {
    const href = a.getAttribute('href') || '';
    if (href.startsWith('zeithalt://missing/')) {
      const filePath = href.replace('zeithalt://missing/', '');
      a.removeAttribute('href');
      a.classList.add('missing-link');
      a.dataset.missingFile = filePath;
      a.title = 'Page not found';
    }
  });


  const root = document.documentElement;

  // Determine initial theme (checking localStorage first, then system preference)
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  
  let savedTheme = null;
  try {
    savedTheme = localStorage.getItem('theme');
  } catch(e) { /* Ignore if DOM Storage is disabled */ }
  
  let currentTheme = savedTheme ? savedTheme : (prefersDark ? 'midnight' : 'parchment');

  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    try {
      localStorage.setItem('theme', theme);
    } catch(e) { /* Ignore if DOM Storage is disabled */ }
    
    themeToggle.textContent = theme === 'midnight' ? 'Light' : 'Dark';
    themeToggle.setAttribute('aria-label', theme === 'midnight' ? 'Switch to Light Mode' : 'Switch to Dark Mode');
    themeToggle.setAttribute('title', theme === 'midnight' ? 'Switch to Light Mode' : 'Switch to Dark Mode');
  }

  // Apply initially
  applyTheme(currentTheme);

  // Toggle on click
  themeToggle.addEventListener('click', () => {
    currentTheme = currentTheme === 'parchment' ? 'midnight' : 'parchment';
    applyTheme(currentTheme);
  });

  // --- Image Lightbox Functionality ---
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  // Find all images inside figures within the content area
  const contentImages = document.querySelectorAll('.content figure img');

  let currentScale = 1;
  let isDragging = false;
  let startX, startY;
  let translateX = 0, translateY = 0;

  function updateTransform() {
    lightboxImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
  }

  function resetImage() {
    currentScale = 1;
    translateX = 0;
    translateY = 0;
    lightboxImg.style.transition = 'transform 0.1s ease-out';
    updateTransform();
  }

  contentImages.forEach(img => {
    img.addEventListener('click', function() {
      lightboxImg.src = this.src;
      lightboxImg.alt = this.alt;
      resetImage();
      lightbox.classList.add('active');
      document.body.classList.add('modal-open'); // Prevent background scrolling
    });
  });

  // Close lightbox ONLY when clicking on the overlay (not the image itself)
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) {
      lightbox.classList.remove('active');
      document.body.classList.remove('modal-open');
    }
  });

  // Zoom functionality (Wheel)
  lightbox.addEventListener('wheel', (e) => {
    e.preventDefault(); // Prevent page scroll
    const zoomSensitivity = 0.1;
    const delta = e.deltaY < 0 ? 1 : -1;
    const zoomFactor = 1 + delta * zoomSensitivity;

    let newScale = currentScale * zoomFactor;

    // Limit scale bounds (allow deep zoom for large maps)
    if (newScale < 0.2) newScale = 0.2;
    if (newScale > 15) newScale = 15;

    // Math to zoom in exactly toward the mouse pointer
    const rect = lightbox.getBoundingClientRect();
    const mouseX = e.clientX - rect.left - rect.width / 2;
    const mouseY = e.clientY - rect.top - rect.height / 2;

    const scaleChange = newScale / currentScale;
    translateX = mouseX - (mouseX - translateX) * scaleChange;
    translateY = mouseY - (mouseY - translateY) * scaleChange;

    currentScale = newScale;
    lightboxImg.style.transition = 'transform 0.1s ease-out'; // Keep zoom smooth
    updateTransform();
  }, { passive: false });

  // Pan functionality (Mouse Drag)
  lightboxImg.addEventListener('mousedown', (e) => {
    e.preventDefault();
    isDragging = true;
    lightboxImg.style.transition = 'none'; // Disable transition for instant 1:1 panning
    startX = e.clientX - translateX;
    startY = e.clientY - translateY;
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    translateX = e.clientX - startX;
    translateY = e.clientY - startY;
    updateTransform();
  });

  window.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      lightboxImg.style.transition = 'transform 0.1s ease-out'; // Restore transition
    }
  });

  // Pan functionality (Touch Drag for Mobile)
  lightboxImg.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      lightboxImg.style.transition = 'none';
      startX = e.touches[0].clientX - translateX;
      startY = e.touches[0].clientY - translateY;
    }
  });

  window.addEventListener('touchmove', (e) => {
    if (!isDragging || e.touches.length !== 1) return;
    // Prevent default behavior (pull-to-refresh, scrolling) while dragging image
    if (lightbox.classList.contains('active')) {
      e.preventDefault();
    }
    translateX = e.touches[0].clientX - startX;
    translateY = e.touches[0].clientY - startY;
    updateTransform();
  }, { passive: false });

  window.addEventListener('touchend', () => {
    isDragging = false;
    lightboxImg.style.transition = 'transform 0.1s ease-out';
  });

  // --- Share Button Functionality ---
  const btnShare = document.getElementById('btn-share');
  if (btnShare) {
    btnShare.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(window.location.href);
        const originalText = btnShare.textContent;
        btnShare.textContent = 'Copied!';
        setTimeout(() => {
          btnShare.textContent = originalText;
        }, 2000);
      } catch (err) {
        console.error('Failed to copy link: ', err);
      }
    });
  }
  // --- Missing Link: Hidden Editor Access (Ctrl+click or Alt+click) ---
  document.addEventListener('click', (e) => {
    const link = e.target.closest('a.missing-link');
    if (!link) return;
    e.preventDefault();
    if (e.ctrlKey || e.altKey) {
      const file = link.dataset.missingFile;
      if (file) {
        window.open(`https://alexxdev.eu/md_editor?file=${encodeURIComponent(file)}`, '_blank');
      }
    }
  });
</script>
</body>
